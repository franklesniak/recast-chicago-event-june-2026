template_sync:
  source_repo: https://github.com/franklesniak/copilot-repo-template.git
  last_reviewed_template_commit: "0123456789abcdef0123456789abcdef01234567"
  included_modules:
    - baseline
    - git-lfs
    - agent-instructions
    - github-platform
    - azure-devops-platform
    - github-actions
    - azure-pipelines
    - github-templates
    - azure-devops-collaboration
    - template-onboarding
    - template-sync-support
    - markdown
    - powershell
    - json
    - yaml
    - schema
    - python
    - terraform
  issue_label_policy: custom
  issue_labels:
    - bug
    - triage
  discussions_policy: deferred-planned-render
  collaboration_policy_follow_up_status: GitHub Discussions enablement remains open in _TODO-repo-init.md.
  host_provider: dual
  azure_devops_organization: contoso
  azure_devops_organization_url: https://dev.azure.com/contoso
  azure_devops_project: Template Adoption
  azure_devops_project_url: https://dev.azure.com/contoso/Template%20Adoption
  azure_devops_repository: downstream-template
  azure_devops_repository_url: https://dev.azure.com/contoso/Template%20Adoption/_git/downstream-template
  azure_devops_clone_url: https://dev.azure.com/contoso/Template%20Adoption/_git/downstream-template
  azure_devops_default_branch: main
  azure_boards_policy: manual-follow-up
  azure_repos_pr_template_policy: materialize
  azure_branch_policy_reviewer_guidance: required-reviewers
  azure_security_intake_policy: manual-follow-up
  azure_security_product_enablement: github-advanced-security
  azure_dependency_update_policy: renovate
  local_overrides:
    - path: README.md
      reason: Project-specific reader-facing documentation.
      default_decision: SKIP
    - path: .github/workflows/python-ci.yml
      reason: Preserve downstream runner and Python version policy.
      default_decision: MERGE
    - path: templates/terraform/
      reason: Terraform was intentionally removed downstream.
      default_decision: REMOVE-LOCAL
    - path: .github/pull_request_template.md
      reason: Review after owner confirms checklist changes.
      default_decision: DEFER
    - path: .github/instructions/powershell.instructions.md
      reason: Protected instruction file requires owner authorization.
      default_decision: PROTECTED-REVIEW
    - path: docs/PR_REVIEW_PROMPTS.md
      reason: Adopt upstream reusable prompt guidance when reviewed.
      default_decision: TAKE
  local_path_ownership:
    - path: docs/
      reason: Project documentation is downstream-owned.
    - path: corpus/
      reason: Test corpus files are downstream application data.
    - path: schemas/local-project.schema.json
      reason: Project-specific schema is not part of the upstream template.
      overlap_exception_reason: Documented local schema lives near retained template schemas.
  deferred_protected_candidates:
    - path: .github/copilot-instructions.md
      source_commit: "89abcdef0123456789abcdef0123456789abcdef"
      reason: Protected governance file needs explicit owner authorization.
  protected_file_decisions:
    - path: CLAUDE.md
      adoption_mode: minimal-preservation
      decision: MERGE
      authorization_basis: Owner authorized protected instruction file edits on 2026-05-27.
      authorized_scope: Remove unadopted stack references and fix broken links only.
    - path: GEMINI.md
      adoption_mode: minimal-preservation
      decision: REMOVE-LOCAL
      authorization_basis: Owner explicitly authorized removing GEMINI.md in issue 632.
      authorized_scope: GEMINI.md only; no other protected files.
      reason: Gemini agent not used by this downstream repository.
