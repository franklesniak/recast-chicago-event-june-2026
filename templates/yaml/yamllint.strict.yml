# yamllint configuration (strict starter)
#
# Stricter alternative to the active repository-root .yamllint.yml defaults.
# This file is starter content shipped under templates/yaml/; it is NOT the
# active configuration for this repository. To adopt it in a
# downstream repository, copy it to `.yamllint.yml` at the repository root
# (overwriting any existing file).
#
# Stricter choices are documented by the upstream template's design-decision
# ADRs:
# https://github.com/franklesniak/copilot-repo-template/blob/HEAD/.github/TEMPLATE_DESIGN_DECISIONS.md
#
#   - truthy.check-keys: true
#       Per the "yamllint truthy.check-keys Default" ADR, this is the
#       documented stricter alternative for repositories that want maximum
#       YAML 1.2 hygiene. Adopting this setting REQUIRES quoting the
#       GitHub Actions trigger key as `"on":` in every workflow file under
#       `.github/workflows/*.yml`; the unquoted `on:` key (the idiomatic
#       Actions form) is parsed as the boolean `true` under YAML 1.1 truthy
#       resolution and yamllint will flag it. Adopt this configuration only
#       if you are willing to update every workflow file accordingly.
#
#   - line-length at default error severity (no `level: warning`)
#       Per the "yamllint line-length Warning Level Default" ADR, removing
#       the `level: warning` setting promotes long-line warnings to errors,
#       and reformatting any offending YAML files (issue templates, workflow
#       `run:` blocks, etc.) becomes a precondition for adoption.
#
# All other rule values match the lenient starter so that the difference
# between the two is restricted to the truthy and line-length settings.
#
# See https://yamllint.readthedocs.io/en/stable/configuration.html
extends: default

rules:
  braces:
    max-spaces-inside: 1
  brackets:
    max-spaces-inside: 1
  comments:
    min-spaces-from-content: 1
    require-starting-space: true
  comments-indentation: disable
  document-start:
    present: false
  empty-lines:
    max: 1
    max-start: 0
    max-end: 1
  indentation:
    spaces: 2
    indent-sequences: true
    check-multi-line-strings: false
  line-length:
    max: 120
    allow-non-breakable-words: true
    allow-non-breakable-inline-mappings: true
  new-line-at-end-of-file: enable
  trailing-spaces: enable
  truthy:
    allowed-values:
      - "true"
      - "false"
    check-keys: true
