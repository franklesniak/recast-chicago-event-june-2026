# yamllint configuration (lenient starter)
#
# This file mirrors the active repository-root .yamllint.yml defaults shipped
# by the franklesniak/copilot-repo-template template. Copy it to
# `.yamllint.yml` at the root of a downstream repository (overwriting any
# existing file) when you want the template's current YAML linting defaults
# verbatim.
#
# Defaults preserved here (see README.md in this directory and the upstream
# template's design-decision ADRs for the rationale):
# https://github.com/franklesniak/copilot-repo-template/blob/HEAD/.github/TEMPLATE_DESIGN_DECISIONS.md
#
#   - truthy.check-keys: false
#       Preserves the idiomatic GitHub Actions `on:` key without per-file
#       exception comments. See the "yamllint truthy.check-keys Default" ADR.
#
#   - line-length.level: warning
#       Long lines surface as warnings rather than errors so that long URLs,
#       descriptive prose, and multi-line shell commands inside workflow `run:`
#       blocks do not block PRs. See the "yamllint line-length Warning Level
#       Default" ADR.
#
#   - comments-indentation: disable
#       Avoids friction with comment placement inside nested blocks.
#
# See https://yamllint.readthedocs.io/en/stable/configuration.html
extends: default

rules:
  braces:
    max-spaces-inside: 1
  brackets:
    max-spaces-inside: 1
  comments:
    min-spaces-from-content: 1
    require-starting-space: true
  comments-indentation: disable
  document-start:
    present: false
  empty-lines:
    max: 1
    max-start: 0
    max-end: 1
  indentation:
    spaces: 2
    indent-sequences: true
    check-multi-line-strings: false
  line-length:
    max: 120
    allow-non-breakable-words: true
    allow-non-breakable-inline-mappings: true
    # Kept at `warning` instead of the default `error`. See the upstream
    # template's "yamllint line-length Warning Level Default" ADR:
    # https://github.com/franklesniak/copilot-repo-template/blob/HEAD/.github/TEMPLATE_DESIGN_DECISIONS.md
    level: warning
  new-line-at-end-of-file: enable
  trailing-spaces: enable
  truthy:
    allowed-values:
      - "true"
      - "false"
    check-keys: false
