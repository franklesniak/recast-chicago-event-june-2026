# Data file linting CI Workflow
#
# Purpose: Run JSON, YAML, and GitHub Actions workflow validation as a
# first-class, dedicated CI workflow alongside the aggregate pre-commit gate
# (precommit-ci.yml) and retained language/documentation workflows.
#
# Hooks executed (all from .pre-commit-config.yaml):
#   - check-json        — strict JSON syntax (.json only; .jsonc excluded)
#   - check-toml        — TOML syntax (any *.toml; covers .codex/config.toml
#                         and any other TOML file added downstream)
#   - check-yaml        — YAML parse check (.yml / .yaml)
# template-sync: begin yaml-only
#   - yamllint          — YAML style enforcement per .yamllint.yml
# template-sync: end yaml-only
#   - actionlint        — GitHub Actions workflow linting
# template-sync: begin template-sync-support-only
#   - validate-template-sync-marker-valid-examples
#                         — JSON Schema validation for valid template-sync
#                           marker fixtures under
#                           `schemas/examples/template-sync-marker/`.
#   - validate-template-sync-instruction-contracts-valid-examples
#                         — JSON Schema validation for valid template-sync
#                           instruction-contract fixtures under
#                           `schemas/examples/template-sync-instruction-contracts/`.
#   - validate-first-adoption-quality-suppressions-valid-examples
#                         — JSON Schema validation for valid first-adoption
#                           quality suppression fixtures under
#                           `schemas/examples/first-adoption-quality-suppressions/`.
#   - validate-template-sync-manifest-schema
#                         — JSON Schema metaschema validation for the
#                           template sync manifest schema.
#   - validate-template-sync-marker-schema
#                         — JSON Schema metaschema validation for the
#                           template sync marker schema.
#   - validate-template-sync-instruction-contracts-schema
#                         — JSON Schema metaschema validation for the
#                           template sync instruction contracts schema.
#   - validate-first-adoption-quality-suppressions-schema
#                         — JSON Schema metaschema validation for the
#                           first-adoption quality suppressions schema.
#   - validate-template-sync-manifest
#                         — JSON Schema validation for
#                           `.template-sync/manifest.yml`.
#   - validate-template-sync-marker
#                         — JSON Schema validation for
#                           `.template-sync/marker.yml` when present.
#   - validate-template-sync-instruction-contracts
#                         — JSON Schema validation for
#                           `.template-sync/instruction-contracts.yml`.
#   - validate-first-adoption-quality-suppressions
#                         — JSON Schema validation for
#                           `.template-sync/first-adoption/quality-suppressions.json`
#                           when present.
#   - validate-instruction-contracts-upstream
#                         — Required-anchor validation for the upstream
#                           template's protected instruction files.
#   - validate-instruction-contracts-downstream
#                         — Required-anchor validation for downstream retained
#                           protected instruction files.
# template-sync: end template-sync-support-only
# template-sync: begin github-platform-only
#   - validate-dependabot-config
#                         — JSON Schema validation for `.github/dependabot.yml`
#                           against `vendor.dependabot`.
# template-sync: end github-platform-only
#
# Schema-backed checks are invoked by pre-commit alias instead of the aggregate
# `check-jsonschema` or `check-metaschema` hook IDs so module-owned validation
# can be removed without leaving CI steps that call stripped or unrelated hooks.
#
# Design Decisions:
#
# 1. CI Ownership / Relationship to precommit-ci.yml:
#    `precommit-ci.yml` runs the full `pre-commit run --all-files` pipeline
#    as the single canonical aggregate pre-commit gate. This
#    workflow does NOT replace that — it adds dedicated visibility and a
#    distinct required-check identity for JSON/YAML/Actions validation so
#    branch protection rules and contributors can reason about data-file
#    quality independently of the aggregate gate.
#
#    Trade-off: the JSON/YAML/actionlint hooks run in both workflows. This
#    duplication is intentional and accepted in exchange for clearer
#    ownership and parity with the other retained workflows.
#
# 2. Relationship to auto-fix-precommit.yml:
#    `.github/workflows/auto-fix-precommit.yml` is intentionally NOT a peer
#    of this workflow. It is a fix-up workflow scoped to `copilot/**`
#    branches that auto-applies pre-commit fixes; it is not a contract
#    enforcement gate. `data-ci.yml` is a contract enforcement gate for all
#    PRs and pushes.
#
# 3. Trigger Policy:
#    This workflow runs on all pushes and pull requests so branch rulesets can
#    use one stable required-check identity for data-file validation.
#
# 4. Job and Workflow Naming:
#    The workflow name (`Data file linting`) and job name (`Data file
#    linting`) are deliberately distinct from `Pre-commit CI` / `Pre-commit`
#    so that branch protection rules can require data-file validation
#    independently from aggregate pre-commit validation.

name: Data file linting

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  data-file-linting:
    name: Data file linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          # See: .github/instructions/yaml.instructions.md (GitHub Actions Setup Version Pins).
          python-version: '3.14'
          cache: 'pip'

      - name: Cache pre-commit hooks
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run check-json
        run: pre-commit run check-json --all-files

      - name: Run check-toml
        run: pre-commit run check-toml --all-files

      - name: Run check-yaml
        run: pre-commit run check-yaml --all-files

      # template-sync: begin yaml-only
      - name: Run yamllint
        run: pre-commit run yamllint --all-files
      # template-sync: end yaml-only

      - name: Run actionlint
        run: pre-commit run actionlint --all-files

      # template-sync: begin template-sync-support-only
      - name: Run validate-template-sync-marker-valid-examples
        run: pre-commit run validate-template-sync-marker-valid-examples --all-files

      - name: Run validate-template-sync-instruction-contracts-valid-examples
        run: pre-commit run validate-template-sync-instruction-contracts-valid-examples --all-files

      - name: Run validate-first-adoption-quality-suppressions-valid-examples
        run: pre-commit run validate-first-adoption-quality-suppressions-valid-examples --all-files

      - name: Run validate-template-sync-manifest-schema
        run: pre-commit run validate-template-sync-manifest-schema --all-files

      - name: Run validate-template-sync-marker-schema
        run: pre-commit run validate-template-sync-marker-schema --all-files

      - name: Run validate-template-sync-instruction-contracts-schema
        run: pre-commit run validate-template-sync-instruction-contracts-schema --all-files

      - name: Run validate-first-adoption-quality-suppressions-schema
        run: pre-commit run validate-first-adoption-quality-suppressions-schema --all-files

      - name: Run validate-template-sync-manifest
        run: pre-commit run validate-template-sync-manifest --all-files

      - name: Run validate-template-sync-marker
        run: pre-commit run validate-template-sync-marker --all-files

      - name: Run validate-template-sync-instruction-contracts
        run: pre-commit run validate-template-sync-instruction-contracts --all-files

      - name: Run validate-first-adoption-quality-suppressions
        run: pre-commit run validate-first-adoption-quality-suppressions --all-files

      - name: Run validate-instruction-contracts-upstream
        run: pre-commit run validate-instruction-contracts-upstream --all-files

      - name: Run validate-instruction-contracts-downstream
        run: pre-commit run validate-instruction-contracts-downstream --all-files
      # template-sync: end template-sync-support-only

      # template-sync: begin github-platform-only
      - name: Run validate-dependabot-config
        run: pre-commit run validate-dependabot-config --all-files
      # template-sync: end github-platform-only
