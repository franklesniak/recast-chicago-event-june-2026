name: Bug Report
description: Report a problem with the PowerShell demo script, tests, or repo tooling.
title: "[Bug] "
labels:
  - bug
  - triage
body:
  - type: markdown
    attributes:
      value: |
        If this is a security vulnerability, do not file a public issue.
        Use the repository's private vulnerability reporting flow when enabled,
        or follow SECURITY.md.

  - type: checkboxes
    id: pre_flight
    attributes:
      label: Pre-flight checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: This is not a security vulnerability.
          required: true
        - label: I removed secrets, tenant identifiers, device names, and personal data from logs or examples.
          required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the repository is affected?
      options:
        - PowerShell demo script
        - Pester tests or Microsoft Graph fixtures
        - GitHub Actions or validation tooling
        - Markdown or repository documentation
        - Template-sync maintenance
        - Repository policy or governance
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the problem clearly.
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to reproduce
      description: Paste the exact local commands or interaction steps.
      render: text
      placeholder: |
        pwsh -File .\scripts\Get-AllWin11ComplianceStatus.ps1
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      description: Paste sanitized output only. Attach longer logs if needed.
      render: text
    validations:
      required: false

  - type: input
    id: operating_system
    attributes:
      label: Operating system
      placeholder: Windows 11 24H2
    validations:
      required: false

  - type: textarea
    id: powershell_versions
    attributes:
      label: PowerShell and module versions
      description: Include PowerShell version, Microsoft Graph module versions, and any relevant tooling versions.
      render: text
      placeholder: |
        $PSVersionTable.PSVersion
        Get-Module Microsoft.Graph* -ListAvailable | Select-Object Name, Version
    validations:
      required: false

  - type: dropdown
    id: reproducibility
    attributes:
      label: Reproducibility
      options:
        - Consistent
        - Intermittent
        - Unable to reproduce reliably
        - Only happened once
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: Maintainers may adjust this during triage.
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Add any other useful, sanitized context.
    validations:
      required: false
