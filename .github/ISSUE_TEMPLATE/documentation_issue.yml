name: Documentation Issue
description: Report unclear, missing, outdated, or broken documentation.
title: "[Docs] "
labels:
  - documentation
  - triage
body:
  - type: checkboxes
    id: pre_flight
    attributes:
      label: Pre-flight checklist
      options:
        - label: I searched existing issues for this documentation problem.
          required: true
        - label: This is about documentation content, not script behavior.
          required: true

  - type: input
    id: location
    attributes:
      label: Location
      description: Link to the file, heading, or page where the issue appears.
      placeholder: README.md#validation
    validations:
      required: false

  - type: textarea
    id: problem
    attributes:
      label: What is wrong or missing?
      description: Describe the documentation issue clearly.
    validations:
      required: true

  - type: textarea
    id: suggested_change
    attributes:
      label: Suggested change
      description: Suggest wording or structure if you have a concrete proposal.
    validations:
      required: false

  - type: dropdown
    id: doc_issue_type
    attributes:
      label: Issue type
      options:
        - Typo or grammar
        - Unclear or confusing
        - Missing information
        - Broken link
        - Outdated information
        - Code example issue
        - Formatting or rendering
        - Other
    validations:
      required: false
