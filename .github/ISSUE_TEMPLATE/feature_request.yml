name: Feature Request
description: Suggest an improvement to the demo script, tests, documentation, or tooling.
title: "[Feature] "
labels:
  - enhancement
  - triage
body:
  - type: checkboxes
    id: pre_flight
    attributes:
      label: Pre-flight checklist
      options:
        - label: I searched existing issues and discussions first.
          required: true
        - label: This request does not require publishing secrets, tenant identifiers, device names, or personal data.
          required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the repository would this change affect?
      options:
        - PowerShell demo script
        - Pester tests or Microsoft Graph fixtures
        - GitHub Actions or validation tooling
        - Markdown or repository documentation
        - Template-sync maintenance
        - Repository policy or governance
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem would this solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior or change you want.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Note any workarounds or different approaches you considered.
    validations:
      required: false

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: What should be true when this is complete?
      placeholder: |
        - [ ] ...
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Maintainers may adjust this during triage.
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Add examples, screenshots, or sanitized details.
    validations:
      required: false
