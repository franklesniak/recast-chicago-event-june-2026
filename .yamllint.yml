# yamllint configuration
#
# Aligned with the full template baseline. The `truthy.check-keys: false`
# setting is intentional so GitHub Actions workflow files can use the
# idiomatic unquoted `on:` key without yamllint flagging it as a truthy
# value. See `.github/TEMPLATE_DESIGN_DECISIONS.md` for the rationale
# behind this default and the related `line-length` warning level.
#
# See https://yamllint.readthedocs.io/en/stable/configuration.html
extends: default

rules:
  braces:
    max-spaces-inside: 1
  brackets:
    max-spaces-inside: 1
  comments:
    min-spaces-from-content: 1
    require-starting-space: true
  comments-indentation: disable
  document-start:
    present: false
  empty-lines:
    max: 1
    max-start: 0
    max-end: 1
  indentation:
    spaces: 2
    indent-sequences: true
    check-multi-line-strings: false
  line-length:
    max: 120
    allow-non-breakable-words: true
    allow-non-breakable-inline-mappings: true
    # Kept at `warning` instead of the default `error`. See
    # `.github/TEMPLATE_DESIGN_DECISIONS.md` →
    # "yamllint line-length Warning Level Default" for the rationale.
    level: warning
  new-line-at-end-of-file: enable
  trailing-spaces: enable
  truthy:
    allowed-values:
      - "true"
      - "false"
    check-keys: false
