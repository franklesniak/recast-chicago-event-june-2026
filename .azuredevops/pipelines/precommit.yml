# Azure Pipelines aggregate pre-commit gate.
#
# Azure Repos pull request validation is configured through branch policy build
# validation. This YAML intentionally omits a `pr:` trigger.

name: "$(Date:yyyyMMdd).$(Rev:r)"

trigger:
  branches:
    include:
      - "*"

parameters:
  - name: pythonVersion
    type: string
    default: "3.14"

pool:
  vmImage: "ubuntu-latest"

steps:
  - checkout: self
    fetchDepth: 0

  - task: UsePythonVersion@0
    displayName: "Use Python ${{ parameters.pythonVersion }}"
    inputs:
      versionSpec: ${{ parameters.pythonVersion }}

  # template-sync: begin terraform-only
  - bash: |
      set -euo pipefail
      sudo apt-get update
      sudo apt-get install -y gnupg software-properties-common
      wget -O- https://apt.releases.hashicorp.com/gpg |
        gpg --dearmor |
        sudo tee /usr/share/keyrings/hashicorp-archive-keyring.gpg >/dev/null
      echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" |
        sudo tee /etc/apt/sources.list.d/hashicorp.list
      sudo apt-get update
      sudo apt-get install -y "terraform=${TERRAFORM_VERSION}-*"
      go install "github.com/terraform-linters/tflint@${TFLINT_VERSION}"
      echo "##vso[task.prependpath]$HOME/go/bin"
    displayName: "Install Terraform and TFLint"
    env:
      TERRAFORM_VERSION: "1.14.4"
      TFLINT_VERSION: "v0.51.1"
  # template-sync: end terraform-only

  - bash: |
      set -euo pipefail
      python -m pip install --upgrade pip
      python -m pip install pre-commit
    displayName: "Install pre-commit"
    workingDirectory: "$(Build.SourcesDirectory)"

  - bash: |
      set -euo pipefail
      pre-commit run --all-files
    displayName: "Run pre-commit hooks"
    workingDirectory: "$(Build.SourcesDirectory)"
